<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАСИЛИЧ — Бонусы и Ссылки</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #3b82f6;
            object-fit: cover;
            margin-bottom: 10px;
        }
        h1 { margin: 10px 0; font-size: 24px; }
        .subtitle-badge {
            background: #1e293b;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #334155;
        }
        .tg-button {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0088cc;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 25px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .tg-button img { width: 24px; margin-right: 10px; }
        .card {
            background: #1e293b;
            border-radius: 15px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #334155;
        }
        .card-content { padding: 20px; text-align: center; }
        .brand-name { font-size: 22px; font-weight: bold; color: #3b82f6; margin-bottom: 5px; }
        .bonus-text { font-size: 14px; color: #94a3b8; margin-bottom: 15px; }
        .promo-box {
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px dashed #3b82f6;
            cursor: pointer;
        }
        .promo-box strong { color: #60a5fa; font-size: 18px; }
        .btn {
            display: block;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background: #2563eb; }
        .footer-info { margin-top: 20px; color: #64748b; font-size: 13px; }
    </style>
</head>
<body>

    <header class="header">
        <img src="vasilich.jpg" alt="Avatar" class="avatar">
        <h1>ВАСИЛИЧ</h1>
        <div class="subtitle-badge">Внизу страницы БОНУС 👇🎁</div>
    </header>

    <a href="https://t.me/vasilich_bonus_bot" class="tg-button">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="TG">
        Перейти в telegram-бот
    </a>

    <!-- Секция 1WIN -->
    <div class="card">
        <div class="card-content">
            <div class="brand-name">1WIN</div>
            <div class="bonus-text">БОНУС 500% НА ДЕПОЗИТ</div>
            <div class="promo-box">
                ПРОМОКОД: <strong id="promo1">VASILICHBONUS</strong>
            </div>
            <a href="https://lkga.cc/3603f5" class="btn">ЗАБРАТЬ БОНУС</a>
        </div>
    </div>

    <!-- Секция JOYCASINO -->
    <div class="card">
        <div class="card-content">
            <div class="brand-name">JOYCASINO</div>
            <div class="bonus-text">200 БЕСПЛАТНЫХ СПИНОВ</div>
            <div class="promo-box">
                ПРОМОКОД: <strong id="promo2">VASILICH777</strong>
            </div>
            <a href="https://52758.call2me.pro/ru/registration?partner=p52758p3328437p54ff" class="btn">ЗАБРАТЬ БОНУС</a>
        </div>
    </div>

    <div class="footer-info">
        Связь: @vasilich_bonus_bot
    </div>

    <script>
        function copyPromo(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert('Промокод скопирован: ' + text);
        }
        document.getElementById('promo1').parentElement.onclick = () => copyPromo('promo1');
        document.getElementById('promo2').parentElement.onclick = () => copyPromo('promo2');
    </script>

</body>
</html>
